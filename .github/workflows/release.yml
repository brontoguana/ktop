name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu musl-dev
            # Install aarch64 musl cross-compiler
            wget -q https://musl.cc/aarch64-linux-musl-cross.tgz
            tar xzf aarch64-linux-musl-cross.tgz
            echo "$PWD/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH
          else
            sudo apt-get install -y musl-tools
          fi

      - name: Build
        working-directory: ktop-rs
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-musl-gcc
          fi
          cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cp ktop-rs/target/${{ matrix.target }}/release/ktop ktop-${{ matrix.target }}
          chmod +x ktop-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ktop-${{ matrix.target }}
          path: ktop-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ktop-*
          generate_release_notes: true
